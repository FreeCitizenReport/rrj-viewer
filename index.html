<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riverside Regional Jail — 2026 Booking Records</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
#header { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: nowrap; }
#header h1 { font-size: 14px; font-weight: 700; color: #f0f6fc; white-space: nowrap; }
#search-wrap { position: relative; }
#search-input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 10px; border-radius: 6px; font-size: 12px; width: 170px; }
#search-input:focus { outline: none; border-color: #1f6feb; }
#jump-wrap { display: flex; gap: 4px; }
#jump-input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 8px; border-radius: 6px; font-size: 12px; width: 70px; }
#jump-input:focus { outline: none; border-color: #1f6feb; }
button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 11px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
button:hover { background: #30363d; color: #f0f6fc; }
button.active-filter { background: #1f3a5f; border-color: #1f6feb; color: #79c0ff; }
#counter { font-size: 12px; color: #8b949e; margin-left: auto; white-space: nowrap; }
#counter .filtered-count { color: #e3b341; font-weight: 600; }
#nav-btns { display: flex; gap: 4px; }

/* FILTER BAR */
#filter-bar { background: #0d1117; border-bottom: 1px solid #30363d; padding: 8px 14px; display: none; flex-wrap: wrap; gap: 8px; align-items: flex-end; flex-shrink: 0; }
#filter-bar.open { display: flex; }
.filter-group { display: flex; flex-direction: column; gap: 3px; }
.filter-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: #8b949e; }
select, .filter-text { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 8px; border-radius: 5px; font-size: 12px; }
select:focus, .filter-text:focus { outline: none; border-color: #1f6feb; }
.filter-text { width: 160px; }
#active-filters { font-size: 11px; color: #8b949e; padding: 4px 0; align-self: center; }
#active-filters span { background: #1f3a5f; color: #79c0ff; border-radius: 10px; padding: 2px 8px; margin-right: 4px; }
#clear-filters { background: #4a1818; border-color: #da3633; color: #ff7b72; }
#clear-filters:hover { background: #da3633; color: #fff; }

/* MAIN */
#main { display: flex; flex: 1; overflow: hidden; }

/* LEFT PANEL */
#left-panel { width: 210px; flex-shrink: 0; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
#mugshot-wrap { width: 100%; height: 320px; background: #0d1117; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-bottom: 1px solid #30363d; }
#mugshot { width: 100%; height: 320px; object-fit: contain; background: #0d1117; display: block; }
#id-info { padding: 10px 12px; overflow-y: auto; flex: 1; }
.id-row { margin-bottom: 7px; }
.id-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: #8b949e; margin-bottom: 1px; }
.id-value { font-size: 13px; color: #f0f6fc; font-weight: 500; }
.id-value.name { font-size: 14px; font-weight: 700; color: #58a6ff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-held { background: #da3633; color: #fff; }
.badge-released { background: #238636; color: #fff; }

/* CENTER */
#center-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid #30363d; min-width: 0; }
.panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: #8b949e; padding: 8px 12px 7px; border-bottom: 1px solid #30363d; flex-shrink: 0; }
#charges-section { flex: 1; overflow-y: auto; padding: 10px; }
.charge-card { background: #0d1117; border: 1px solid #30363d; border-radius: 7px; padding: 9px 11px; margin-bottom: 7px; }
.charge-desc { font-size: 13px; font-weight: 600; color: #f0f6fc; margin-bottom: 3px; }
.charge-meta { font-size: 11px; color: #8b949e; display: flex; gap: 10px; flex-wrap: wrap; }
.grade-felony-a { color: #ff7b72; }
.grade-felony-b { color: #e3b341; }
.grade-misd { color: #79c0ff; }
.grade-civil { color: #8b949e; }
.bond-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: #8b949e; padding: 8px 0 5px; border-top: 1px solid #30363d; margin-top: 6px; }
.bond-card { background: #0d1117; border: 1px solid #30363d; border-radius: 7px; padding: 7px 11px; margin-bottom: 5px; font-size: 12px; display: flex; gap: 10px; align-items: center; }
.bond-type { font-weight: 600; color: #e3b341; }
.bond-amount { color: #3fb950; font-weight: 600; }
.empty-msg { color: #8b949e; font-size: 13px; font-style: italic; padding: 6px 0; }

/* RIGHT */
#right-panel { width: 400px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
#court-section { flex: 1; overflow-y: auto; padding: 10px; }
.case-card { background: #0d1117; border: 1px solid #30363d; border-radius: 7px; padding: 9px 11px; margin-bottom: 8px; }
.case-num { font-size: 10px; color: #8b949e; margin-bottom: 3px; font-family: monospace; }
.case-charge { font-size: 13px; font-weight: 600; color: #f0f6fc; margin-bottom: 2px; }
.case-code { font-size: 11px; color: #8b949e; margin-bottom: 5px; }
.case-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.tag-court { background: #1f3a5f; color: #79c0ff; }
.tag-guilty { background: #4a1818; color: #ff7b72; }
.tag-ng { background: #1a4a1a; color: #3fb950; }
.tag-dismissed { background: #2d3a1a; color: #7ee787; }
.tag-nolle { background: #2d2d1a; color: #e3b341; }
.tag-other { background: #1f262d; color: #8b949e; }
.tag-date { background: #1f262d; color: #8b949e; }
.tag-sentence { background: #3a1f5f; color: #d2a8ff; }
        .tag-related { background: #3a2a0a; color: #e3b341; border: 1px dashed #7d5c00; }
        .case-defendant { font-size: 11px; color: #8b949e; margin-bottom: 3px; font-style: italic; }
.no-records-msg { color: #8b949e; font-size: 13px; font-style: italic; padding: 6px 0; }

/* Search dropdown */
#search-results { position: absolute; top: 34px; left: 0; background: #161b22; border: 1px solid #30363d; border-radius: 7px; max-height: 280px; overflow-y: auto; width: 300px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.6); display: none; }
.search-item { padding: 7px 11px; cursor: pointer; border-bottom: 1px solid #21262d; font-size: 12px; }
.search-item:last-child { border-bottom: none; }
.search-item:hover { background: #21262d; }
.search-item .sname { color: #58a6ff; font-weight: 600; }
.search-item .smeta { color: #8b949e; font-size: 11px; margin-top: 1px; }

/* Loading bar */
#loading-bar { position: fixed; bottom: 0; left: 0; height: 3px; background: #1f6feb; z-index: 300; transition: width 0.2s; }

/* Highlight for filter matches */
.hl { background: #332200; border-radius: 3px; padding: 0 2px; color: #e3b341; font-weight: 700; }

/* ── RESPONSIVE / MOBILE ───────────────────────────────── */
@media (max-width: 768px) {
  /* Make body scrollable instead of fixed-height panels */
  body { height: auto; min-height: 100vh; overflow-y: auto; overflow-x: hidden; }

  /* Header: wrap onto 2 rows, search bar expands */
  #header { flex-wrap: wrap; padding: 8px 10px; gap: 6px; }
  #search-wrap { flex: 1 1 130px; min-width: 0; }
  #search-input { width: 100%; box-sizing: border-box; }
  #search-results { width: calc(100vw - 20px); left: 0; }
  #counter { flex: 1 1 100%; text-align: center; }

  /* Stack the three panels vertically */
  #main { flex-direction: column; overflow: visible; height: auto; }

  /* Left: inmate info — 2-column grid to save vertical space */
  #left-panel { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #30363d; flex-shrink: 0; }
  #id-info { overflow-y: visible; flex: none; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; }
  /* Name (1st), Status (6th), County (7th) span full width */
  #id-info > .id-row:nth-child(1),
  #id-info > .id-row:nth-child(6),
  #id-info > .id-row:nth-child(7) { grid-column: 1 / -1; }

  /* Center: mugshot + charges — expand to natural height */
  #center-panel { flex: none; width: 100%; height: auto; overflow: visible; border-right: none; border-bottom: 1px solid #30363d; }
  #mugshot-wrap { height: 260px; flex-shrink: 0; }
  #charges-section { overflow-y: visible; height: auto; }

  /* Right: court history — expand to natural height */
  #right-panel { width: 100%; flex: none; height: auto; overflow: visible; }
  #court-section { overflow-y: visible; height: auto; }
}
</style>
</head>
<body>

<div id="header">
  <h1>🏛 RRJ 2026 Bookings</h1>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search by name…" autocomplete="off">
    <div id="search-results"></div>
  </div>
  <div id="jump-wrap">
    <input id="jump-input" type="number" placeholder="#" min="1">
    <button onclick="doJump()">Go</button>
  </div>
  <button id="filter-toggle" onclick="toggleFilters()">⚙ Filters <span id="filter-count"></span></button>
  <div id="nav-btns">
    <button onclick="prev()">← Prev</button>
    <button onclick="next()">Next →</button>
  </div>
  <div id="counter">Record 1 of 651</div>
</div>

<div id="filter-bar">
  <div class="filter-group">
    <div class="filter-label">Sex</div>
    <select id="f-sex" onchange="applyFilters()">
      <option value="">All</option>
      <option value="M">Male</option>
      <option value="F">Female</option>
    </select>
  </div>
  <div class="filter-group">
    <div class="filter-label">Race</div>
    <select id="f-race" onchange="applyFilters()">
      <option value="">All</option>
      <option value="WHITE">White</option>
      <option value="BLACK">Black</option>
      <option value="ASIAN OR PACIFIC ISLANDER">Asian / Pac. Islander</option>
    </select>
  </div>
  <div class="filter-group">
    <div class="filter-label">County / Jurisdiction</div>
    <select id="f-county" onchange="applyFilters()">
      <option value="">All</option>
      <option value="BLAND COUNTY">BLAND COUNTY</option><option value="BRUNSWICK COUNTY">BRUNSWICK COUNTY</option><option value="BUCKINGHAM COUNTY">BUCKINGHAM COUNTY</option><option value="CHARLES CITY COUNTY">CHARLES CITY COUNTY</option><option value="CHESTERFIELD COUNTY">CHESTERFIELD COUNTY</option><option value="CITY OF COLONIAL HEIGHTS">CITY OF COLONIAL HEIGHTS</option><option value="CITY OF HAMPTON">CITY OF HAMPTON</option><option value="CITY OF HOPEWELL">CITY OF HOPEWELL</option><option value="CITY OF PETERSBURG">CITY OF PETERSBURG</option><option value="CITY OF PORTSMOUTH">CITY OF PORTSMOUTH</option><option value="CITY OF RICHMOND">CITY OF RICHMOND</option><option value="CITY OF ROANOKE">CITY OF ROANOKE</option><option value="CITY OF VIRGINIA BEACH">CITY OF VIRGINIA BEACH</option><option value="FAIRFAX COUNTY">FAIRFAX COUNTY</option><option value="FED. BUREAU OF PRISONS (DETENTION)">FED. BUREAU OF PRISONS (DETENTION)</option><option value="GILES COUNTY">GILES COUNTY</option><option value="INS (IMMIGRATION & NATURALIZATION)">INS (IMMIGRATION & NATURALIZATION)</option><option value="NEW KENT COUNTY">NEW KENT COUNTY</option><option value="PRINCE GEORGE COUNTY">PRINCE GEORGE COUNTY</option><option value="SURRY COUNTY">SURRY COUNTY</option>
    </select>
  </div>
  <div class="filter-group">
    <div class="filter-label">Custody Status</div>
    <select id="f-custody" onchange="applyFilters()">
      <option value="">All</option>
      <option value="held">In Custody</option>
      <option value="released">Released</option>
    </select>
  </div>
  <div class="filter-group">
    <div class="filter-label">Charge Grade</div>
    <select id="f-grade" onchange="applyFilters()">
      <option value="">All</option>
      <option value="A FELONY">A Felony</option>
      <option value="B FELONY">B Felony</option>
      <option value="MISDEMEANOR">Misdemeanor</option>
      <option value="CIVIL">Civil</option>
    </select>
  </div>
  <div class="filter-group">
    <div class="filter-label">Charge Keyword</div>
    <input class="filter-text" id="f-charge" type="text" placeholder="e.g. drugs, assault…" oninput="applyFilters()">
  </div>
  <div class="filter-group">
    <div class="filter-label">Court Records</div>
    <select id="f-court" onchange="applyFilters()">
      <option value="">All</option>
      <option value="yes">Has VA Court Records</option>
      <option value="no">No Court Records</option>
    </select>
  </div>
  <div class="filter-group">
    <div class="filter-label">Court Disposition</div>
    <select id="f-disp" onchange="applyFilters()">
      <option value="">All</option>
      <option value="Acquitted">Acquitted</option><option value="Certified/Circuit">Certified/Circuit</option><option value="Closed">Closed</option><option value="DN">DN</option><option value="DO">DO</option><option value="Dismissed">Dismissed</option><option value="Dismissed/Expunged">Dismissed/Expunged</option><option value="Finding For">Finding For</option><option value="Guilty">Guilty</option><option value="Guilty (Alford)">Guilty (Alford)</option><option value="Guilty (Jury)">Guilty (Jury)</option><option value="Guilty (Reduced)">Guilty (Reduced)</option><option value="NIP">NIP</option><option value="No Finding">No Finding</option><option value="No True Bill">No True Bill</option><option value="Nolle Pros">Nolle Pros</option><option value="Not Guilty">Not Guilty</option><option value="Not Guilty/Insanity">Not Guilty/Insanity</option><option value="Other">Other</option><option value="Probation">Probation</option><option value="Remanded">Remanded</option><option value="Restored">Restored</option><option value="Reversed">Reversed</option><option value="Transferred">Transferred</option><option value="Withdrawn">Withdrawn</option>
    </select>
  </div>
  <button id="clear-filters" onclick="clearFilters()">✕ Clear All</button>
  <div id="active-filters"></div>
</div>

<div id="main">
  <div id="left-panel">
    <div id="id-info"></div>
  </div>
  <div id="center-panel">
    <div id="mugshot-wrap"><img id="mugshot" src="" alt="Mugshot"></div>
    <div class="panel-title" id="charges-title">Charges &amp; Bond</div>
    <div id="charges-section"></div>
  </div>
  <div id="right-panel">
    <div class="panel-title" id="court-title">Virginia Court History</div>
    <div id="court-section"></div>
  </div>
</div>
<div id="loading-bar" style="width:0%"></div>

<script>
let RECORDS = [];

// ── Load data.json then start the app ────────────────────────────────────
(function loadData() {
  const bar = document.getElementById('loading-bar');
  bar.style.width = '10%';
  fetch('data.json?v=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      RECORDS = data;
      bar.style.width = '40%';
      preloadBlobs();
    })
    .catch(err => {
      bar.style.background = '#da3633';
      bar.style.width = '100%';
      console.error('Failed to load data.json:', err);
    });
})();


// Preload mugshots as blob URLs
const mugshotURLs = {};
function preloadBlobs() {
  let i = 0;
  const bar = document.getElementById('loading-bar');
  function next() {
    if (i >= RECORDS.length) {
      bar.style.width = '100%';
      setTimeout(() => bar.style.display = 'none', 600);
      applyFilters();
      return;
    }
    const rec = RECORDS[i++];
    bar.style.width = (i / RECORDS.length * 100).toFixed(1) + '%';
    if (rec.mugshot) {
      try {
        const arr = rec.mugshot.split(',');
        const mime = (arr[0].match(/:(.*?);/) || [])[1] || 'image/jpeg';
        const bin = atob(arr[1]);
        const bytes = new Uint8Array(bin.length);
        for (let j = 0; j < bin.length; j++) bytes[j] = bin.charCodeAt(j);
        mugshotURLs[rec.bookingNum] = URL.createObjectURL(new Blob([bytes], {type: mime}));
      } catch(e) {}
    }
    if (i % 20 === 0) setTimeout(next, 0); else next();
  }
  next();
}

// --- Filter state ---
let filteredIndices = RECORDS.map((_, i) => i); // all by default
let filteredPos = 0; // position within filteredIndices
let filtersOpen = false;

function applyFilters() {
  const sex = document.getElementById('f-sex').value;
  const race = document.getElementById('f-race').value;
  const county = document.getElementById('f-county').value;
  const custody = document.getElementById('f-custody').value;
  const grade = document.getElementById('f-grade').value;
  const chargeKw = document.getElementById('f-charge').value.trim().toUpperCase();
  const court = document.getElementById('f-court').value;
  const disp = document.getElementById('f-disp').value;

  filteredIndices = [];
  for (let i = 0; i < RECORDS.length; i++) {
    const r = RECORDS[i];
    if (sex && r.sex !== sex) continue;
    if (race && r.race !== race) continue;
    if (county && r.county !== county) continue;
    if (custody === 'held' && r.releaseDate) continue;
    if (custody === 'released' && !r.releaseDate) continue;
    if (grade && !r.charges.some(c => c.grade === grade)) continue;
    if (chargeKw && !r.charges.some(c => (c.description||'').toUpperCase().includes(chargeKw))) continue;
    if (court === 'yes' && r.courtHistory.length === 0) continue;
    if (court === 'no' && r.courtHistory.length > 0) continue;
    if (disp && !r.courtHistory.some(c => c.dispositionDesc === disp)) continue;
    filteredIndices.push(i);
  }

  filteredPos = 0;

  // Update active filter badges
  const active = [];
  if (sex) active.push(sex === 'M' ? 'Male' : 'Female');
  if (race) active.push(race.split(' ')[0]);
  if (county) active.push(county.replace('CITY OF ','').replace(' COUNTY',''));
  if (custody) active.push(custody === 'held' ? 'In Custody' : 'Released');
  if (grade) active.push(grade);
  if (chargeKw) active.push('Charge: ' + chargeKw);
  if (court) active.push(court === 'yes' ? 'Has Court Records' : 'No Court Records');
  if (disp) active.push('Disp: ' + disp);

  const afEl = document.getElementById('active-filters');
  afEl.innerHTML = active.map(a => '<span>' + a + '</span>').join('');

  const countEl = document.getElementById('filter-count');
  const btn = document.getElementById('filter-toggle');
  if (active.length > 0) {
    countEl.textContent = ' (' + active.length + ')';
    btn.classList.add('active-filter');
  } else {
    countEl.textContent = '';
    btn.classList.remove('active-filter');
  }

  if (filteredIndices.length > 0) {
    render();
  } else {
    document.getElementById('counter').innerHTML = '<span style="color:#ff7b72">No matches</span>';
  }
}

function clearFilters() {
  ['f-sex','f-race','f-county','f-custody','f-grade','f-court','f-disp'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-charge').value = '';
  applyFilters();
}

function toggleFilters() {
  filtersOpen = !filtersOpen;
  document.getElementById('filter-bar').classList.toggle('open', filtersOpen);
}

function dispTagClass(d) {
  if (!d) return 'tag-other';
  if ((d.includes('Guilty') || d === 'GP') && !d.includes('Not')) return 'tag-guilty';
  if (d.includes('Not Guilty')) return 'tag-ng';
  if (d === 'Dismissed') return 'tag-dismissed';
  if (d === 'Nolle Pros') return 'tag-nolle';
  return 'tag-other';
}

function gradeClass(g) {
  if (g === 'A FELONY') return 'grade-felony-a';
  if (g === 'B FELONY') return 'grade-felony-b';
  if (g === 'MISDEMEANOR') return 'grade-misd';
  return 'grade-civil';
}

function highlight(text, kw) {
  if (!kw) return text;
  const idx = text.toUpperCase().indexOf(kw);
  if (idx < 0) return text;
  return text.slice(0, idx) + '<span class="hl">' + text.slice(idx, idx + kw.length) + '</span>' + text.slice(idx + kw.length);
}

function normalizeName(n) {
      if (!n) return '';
      return n.toUpperCase().replace(/\b(JR|SR|II|III|IV|V)\b\.?/g, '').replace(/\s+/g, ' ').trim();
    }

    function render() {
  if (filteredIndices.length === 0) return;
  const idx = filteredIndices[filteredPos];
  const rec = RECORDS[idx];
  const chargeKw = document.getElementById('f-charge').value.trim().toUpperCase();

  // Mugshot
  const img = document.getElementById('mugshot');
  img.src = mugshotURLs[rec.bookingNum] || rec.mugshot ||
    'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="210" height="210"><rect width="210" height="210" fill="%230d1117"/><rect x="55" y="75" width="100" height="72" rx="8" fill="none" stroke="%238b949e" stroke-width="3"/><circle cx="105" cy="111" r="22" fill="none" stroke="%238b949e" stroke-width="3"/><rect x="88" y="65" width="34" height="12" rx="4" fill="%238b949e"/><text x="105" y="170" text-anchor="middle" fill="%238b949e" font-size="13">Photo Uploading...</text></svg>';

  // ID panel
  document.getElementById('id-info').innerHTML = `
    <div class="id-row"><div class="id-label">Name</div><div class="id-value name">${rec.name}</div></div>
    <div class="id-row"><div class="id-label">Booking #</div><div class="id-value">${rec.bookingNum}</div></div>
    <div class="id-row"><div class="id-label">DOB</div><div class="id-value">${rec.dob}</div></div>
    <div class="id-row"><div class="id-label">Sex / Race</div><div class="id-value">${[rec.sex, rec.race].filter(Boolean).join(' / ') || '—'}</div></div>
    <div class="id-row"><div class="id-label">Booked</div><div class="id-value">${rec.commitmentDate || '—'}</div></div>
    <div class="id-row"><div class="id-label">Status</div><div class="id-value">${rec.releaseDate
      ? '<span class="badge badge-released">Released ' + rec.releaseDate + '</span>'
      : '<span class="badge badge-held">IN CUSTODY</span>'}</div></div>
    <div class="id-row"><div class="id-label">County</div><div class="id-value">${rec.county || '—'}</div></div>
  `;

  // Charges
  const chargeCount = rec.charges ? rec.charges.length : 0;
  document.getElementById('charges-title').textContent = `Charges & Bond (${chargeCount} charge${chargeCount !== 1 ? 's' : ''})`;
  let chargeHTML = '';
  if (chargeCount > 0) {
    chargeHTML = rec.charges.map(c => {
      const desc = chargeKw ? highlight(c.description || '—', chargeKw) : (c.description || '—');
      return `<div class="charge-card">
        <div class="charge-desc">${desc}</div>
        <div class="charge-meta">
          ${c.code ? `<span>${c.code}</span>` : ''}
          ${c.grade ? `<span class="${gradeClass(c.grade)}">${c.grade}</span>` : ''}
          ${c.degree ? `<span>${c.degree}</span>` : ''}
          ${c.offenseDate ? `<span>Offense: ${c.offenseDate}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    chargeHTML = '<div class="empty-msg">No charge details on file.</div>';
  }

  if (rec.bonds && rec.bonds.length > 0) {
    chargeHTML += '<div class="bond-section-title">Bond Information</div>';
    chargeHTML += rec.bonds.map(b => `<div class="bond-card">
      <span class="bond-type">${b.bondType || 'Bond'}</span>
      ${b.amount && b.amount !== '$0.00' ? `<span class="bond-amount">${b.amount}</span>` : ''}
      ${b.status ? `<span style="color:#8b949e">${b.status}</span>` : ''}
    </div>`).join('');
  }
  document.getElementById('charges-section').innerHTML = chargeHTML;

  // Court history
  const caseCount = rec.courtHistory ? rec.courtHistory.length : 0;
  document.getElementById('court-title').textContent = `Virginia Court History (${caseCount} case${caseCount !== 1 ? 's' : ''})`;
  if (caseCount === 0) {
    document.getElementById('court-section').innerHTML = '<div class="no-records-msg">No Virginia court records found.</div>';
  } else {
    const filterDisp = document.getElementById('f-disp').value;
    document.getElementById('court-section').innerHTML = rec.courtHistory.map(c => {
      const isMatch = filterDisp && c.dispositionDesc === filterDisp;
          const exactNameMatch = !c.defendantName || normalizeName(c.defendantName) === normalizeName(rec.name);
      return `<div class="case-card" style="${isMatch ? 'border-color:#e3b341;' : ''}">
        <div class="case-num">${c.formattedCaseNum || c.caseTrackingID}</div>
    ${!exactNameMatch ? `<div class="case-defendant">Court name: ${c.defendantName}</div>` : ''}
        <div class="case-charge">${c.chargeDesc || '—'}</div>
        ${c.codeSection ? `<div class="case-code">§ ${c.codeSection}</div>` : ''}
        <div class="case-tags">
          <span class="tag tag-court">${c.court || 'Court'}</span>
      ${!exactNameMatch ? `<span class="tag tag-related">⚠ Potentially Related</span>` : ''}
          ${c.dispositionDesc ? `<span class="tag ${dispTagClass(c.dispositionDesc)}">${c.dispositionDesc}</span>` : ''}
          ${c.offenseDate ? `<span class="tag tag-date">Offense: ${c.offenseDate}</span>` : ''}
          ${c.dispositionDate ? `<span class="tag tag-date">Disposed: ${c.dispositionDate}</span>` : ''}
          ${c.sentence ? `<span class="tag tag-sentence">Sentence: ${c.sentence}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // Counter
  const total = filteredIndices.length;
  const isFiltered = total < RECORDS.length;
  document.getElementById('counter').innerHTML = isFiltered
    ? `<span class="filtered-count">${filteredPos + 1} of ${total} filtered</span> (of ${RECORDS.length} total)`
    : `Record ${filteredPos + 1} of ${RECORDS.length}`;
}

function prev() {
  if (filteredPos > 0) { filteredPos--; render(); }
}
function next() {
  if (filteredPos < filteredIndices.length - 1) { filteredPos++; render(); }
}

function doJump() {
  const v = parseInt(document.getElementById('jump-input').value);
  if (v >= 1 && v <= filteredIndices.length) { filteredPos = v - 1; render(); }
  document.getElementById('jump-input').value = '';
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft') prev();
  if (e.key === 'ArrowRight') next();
});
document.getElementById('jump-input').addEventListener('keydown', e => { if (e.key === 'Enter') doJump(); });

// Name search dropdown
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toUpperCase();
  if (q.length < 2) { searchResults.style.display = 'none'; return; }
  const matches = filteredIndices
    .map(i => ({r: RECORDS[i], i}))
    .filter(({r}) => r.name.toUpperCase().includes(q))
    .slice(0, 20);
  if (matches.length === 0) { searchResults.style.display = 'none'; return; }
  searchResults.innerHTML = matches.map(({r, i}) => {
    const pos = filteredIndices.indexOf(i);
    return `<div class="search-item" onclick="goTo(${pos})">
      <div class="sname">${r.name}</div>
      <div class="smeta">${r.bookingNum} · ${r.dob} · ${r.sex || ''} · ${r.county || ''}${r.courtHistory.length > 0 ? ' · ' + r.courtHistory.length + ' court records' : ''}</div>
    </div>`;
  }).join('');
  searchResults.style.display = 'block';
});

function goTo(pos) {
  filteredPos = pos;
  render();
  searchResults.style.display = 'none';
  searchInput.value = '';
}

document.addEventListener('click', e => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target))
    searchResults.style.display = 'none';
});

// Init
render();
</script>
</body>
</html>
